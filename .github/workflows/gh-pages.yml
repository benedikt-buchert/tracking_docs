name: Deploy Docs and Constraints to GitHub Pages

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci

      - name: Build Docusaurus site
        run: npm run build
        working-directory: ./demo

      - name: Build target constraints static artifacts
        run: npm run build -w tracking-target-constraints

      - name: Assemble publish directory
        run: |
          rm -rf publish
          mkdir -p publish/constraints
          cp -R demo/build/. publish/
          cp -R packages/tracking-target-constraints/dist/. publish/constraints/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          publish_branch: gh-pages
          cname: tracking-docs-demo.buchert.digital
