name: Release Plugin

on:
  push:
    tags:
      - '*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Verify package version matches tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/docusaurus-plugin-generate-schema-docs/package.json').version")
          if [ "$PACKAGE_VERSION" != "${{ github.ref_name }}" ]; then
            echo "Tag version (${{ github.ref_name }}) does not match package version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: Publish package
        working-directory: ./packages/docusaurus-plugin-generate-schema-docs
        run: npm publish --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: true
